# Nginx site config for DefOex (place in /etc/nginx/sites-available/defoex)
# Frontend build: defoex-frontend/build → /var/www/defoex
# API: proxy /api and /health to gunicorn on 127.0.0.1:8000

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 3.110.209.154 _;

    root /var/www/defoex;
    index index.html;

    client_max_body_size 20M;

    # ^~ stops try_files from stealing API/health routes
    location ^~ /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

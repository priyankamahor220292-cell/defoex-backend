# Nginx site config for DefOex (place in /etc/nginx/sites-available/defoex)
# Frontend build: defoex-frontend/build → /var/www/defoex
# API: proxy /api and /health to gunicorn on 127.0.0.1:8000

server {
    listen 80;
    server_name 3.110.209.154;

    root /var/www/defoex;
    index index.html;

    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
